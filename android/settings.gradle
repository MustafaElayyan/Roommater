pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = file("local.properties")
        if (!localPropertiesFile.exists()) {
            throw new Exception(
                    "android/local.properties is missing.\n" +
                    "Create it from android/local.properties.example and set:\n" +
                    "  flutter.sdk=<absolute path to Flutter SDK>\n" +
                    "  sdk.dir=<absolute path to Android SDK>\n" +
                    "Example:\n" +
                    "  cp android/local.properties.example android/local.properties"
            )
        }
        localPropertiesFile.withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.0" apply false
    id "com.google.gms.google-services" version "4.4.2" apply false
}

include ":app"